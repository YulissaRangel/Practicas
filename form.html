<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/bootstrap.min.css">
     <script src="js/bootstrap.min.js"></script>
    <title>form</title>
</head>

<body style="background-color: rgb(117, 88, 145);">
   <div class="container">
        <div class="row">
            <div class="col">
                 
                    <div class="card shadow p-4 mx-auto" style="max-width: 500px;">
                        <h1>Formulario de registro</h1>
                 <form action="formulario.html" method="post">
                    <!--nombre-->
                        <div class="mb-3">
                    <label for="txtnombre" class="form-label">Nombre completo</label>
                    <input type="text" class="form-control" id="txtnombre" name="txtnombre" placeholder="ingresa tu nombre">
                   
                    
                    </div>
                    <div class="mb-3">
                    <label for="txtemail" class="form-label">Direccion de correo</label>
                    <div class="input-group-text">
                    <span  class="input-group-text">@</span>
                        <input type="email" id="txtemail" class="form-control"  name="txtemail" placeholder="ejem@gmail.com"required>
                     </div>
                            </div>


                     <!--gmail-->
                     <label for="txtnumerodetelefono" class="form-label">Numero de telefono</label>
                     <input type="number" id="txtnumerodetelefono" class="form-control" name="txtnumerodetelefono" placeholder="ejem. +52 87812345">
                    
                 <!--tel-->
                    <label for="txtdate" class="form-label">Fecha de nacimiento</label>
                     <input type="date" id="txtdate" class="form-control" name="txtdate">
                    
                      <!--fecha-->
                      <div class="form-check">
                     <p>Genero</p>
                     <input type="radio" id="hombre" class="form-check-input"  name="genero" value="Hombre" required>
                     <label for="hombre" class="form-check-label">hombre</label>
                        </div> 
                        <div class="form-check">
                    <input type="radio" id="Mujer" class="form-check-input" name="genero" value="Mujer" required>
                    <label for="hombre" class="form-check-label" >Mujer</label> </div>
                   <!--genero--><div class="form-check">
                     <input type="radio" id="Otro" class="form-check-input" name="genero" value="Otro" required>
                     <label for="hombre" class="form-check-label" >Otro</label>
                   </div>
                    
                
                     <label for="txtpass" class="form-label">Contraseña</label>
                     <input type="contra" id="txtpass"  class="form-control" name="txtcontraseña" placeholder="minimo 8 caracteres">
                     
                          <!--pasword-->
                     <label for="txtpassx2" class="form-label">Confirmar Contraseña</label>
                 <input type="password" id="txtpassx2" class="form-control"  name="txtcontraseña" placeholder="min 8 caracteres">
                <div class="form-check mt-3 mb-3" >
                          <!--terminos-->
                 <input type="checkbox" class="form-check-input" id="terminos" name="terminos" required>
                     <label for="terminos" class="form-check-label">Acepto los terminos y condiciones </label> 
                     </div>
             <!--boton-->
                     <input type="submit" class="btn btn-primary btn-lg" value="Registrar">
                    </div>
       
                 </form>
                 </div>
            </div>
        </div>
   </div>
   
        <a href="index.html" class="regresar">⬅ Menú</a>







</body>
</html>
