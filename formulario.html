<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
        <style>
.regresar {
    position: fixed;
    top: 20px;
    left: 20px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    background: linear-gradient(135deg, #7b4fa3, #c79fff);
    color: white;
    padding: 10px 18px;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 600;
    box-shadow: 0 6px 15px rgba(0,0,0,0.3);
    transition: 0.3s;
}

.regresar:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    background: linear-gradient(135deg, #9b6cd1, #e0b3ff);
}
</style>
</head>
<body>
    <h1>Formulario de registro</h1>
    <form action="formulario.html" method="post">

      
        <label for="">Nombre completo</label>
        <input type="text" id="txtnombre" name="txtnombre" placeholder="ingresa tu nombre">
            <br>
                <br>
                    <br>
        <br>
          <!--nombre-->
       <label for="txtemail">Direccion de correo</label>
        <input type="email" id="txtemail" name="txtemail" placeholder="ejem@gmail.com"required>
        <br>
        <br>
        <br>
        <br>
         <!--gmail-->
        <label for="txtnumerodetelefono">Numero de telefono</label>
        <input type="number" id="txtnumerodetelefono" name="txtnumerodetelefono" placeholder="ejem. +52 87812345">
        <br> <br> <br><br>
              <!--tel-->
        <label for="txtdate">Fecha de nacimiento</label>
        <input type="date" id="txtdate" name="txtdate">
        <br><br><br><br>

        <p>Genero</p>

        <label for="hombre">hombre</label><br><br>

        <input type="radio" id="Mujer" name="genero" value="Mujer" required>

        <br><br><br> <br>
         <!--pasword-->
        <label for="txtpassx2">Confirmar Contraseña</label>
        <input type="password" id="txtpassx2"  name="txtcontraseña" placeholder="min 8 caracteres">
        <br><br><br> <br>
          <!--terminos-->
        <input type="checkbox" id="terminos" name="terminos" required>
        <label for="terminos">Acepto los terminos y condiciones </label> <br><br><br>

</html>
